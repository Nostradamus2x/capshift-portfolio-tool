<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CapShift Portfolio Intelligence</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeede9;
    --text: #1a1a18; --text-secondary: #6b6b66;
    --border: rgba(0,0,0,0.12); --border-mid: rgba(0,0,0,0.22);
    --green-bg: #eaf3de; --green-text: #3b6d11;
    --amber-bg: #faeeda; --amber-text: #854f0b;
    --red-bg: #fcebeb; --red-text: #a32d2d;
    --radius-md: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; color: var(--text); background: var(--bg-tertiary); line-height: 1.6; }
  .app-shell { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
  .topbar h1 { font-size: 17px; font-weight: 500; }
  .topbar p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .topbar-right button { font-size: 12px; color: var(--text-secondary); background: none; border: none; cursor: pointer; text-decoration: underline; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1.75rem; }
  .tab-btn { font-size: 13px; padding: 9px 18px; cursor: pointer; color: var(--text-secondary); background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
  .tab-btn.active { color: var(--text); border-bottom: 2px solid var(--text); font-weight: 500; }
  .section { display: none; }
  .section.active { display: block; }
  .last-updated { font-size: 11px; color: var(--text-secondary); margin-bottom: 1rem; }
  .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .metric-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; }
  .metric-card .m-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .metric-card .m-value { font-size: 21px; font-weight: 500; }
  .metric-card .m-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
  .section-label { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
  .company-list { display: flex; flex-direction: column; gap: 8px; }
  .company-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; cursor: pointer; transition: border-color 0.12s; }
  .company-card:hover { border-color: var(--border-mid); }
  .company-card.selected { border-color: var(--text); }
  .cc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .cc-name { font-size: 14px; font-weight: 500; }
  .cc-meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: var(--radius-md); font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-red { background: var(--red-bg); color: var(--red-text); }
  .pillars { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
  .pillar { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 9px 12px; }
  .p-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .p-score { font-size: 15px; font-weight: 500; }
  .p-bar { height: 3px; background: var(--bg-tertiary); border-radius: 2px; margin-top: 6px; }
  .p-fill { height: 3px; border-radius: 2px; }
  .panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-top: 1rem; }
  .panel h3 { font-size: 14px; font-weight: 500; margin-bottom: 1rem; }
  .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--text-secondary); }
  .form-group input, .form-group select, .form-group textarea { font-size: 13px; padding: 8px 10px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); background: var(--bg); color: var(--text); font-family: inherit; width: 100%; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--text); }
  .form-group textarea { resize: vertical; min-height: 72px; }
  .full { grid-column: 1 / -1; }
  .btn-run { margin-top: 1rem; padding: 8px 18px; font-size: 13px; font-weight: 500; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-md); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .btn-run:hover { opacity: 0.88; }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
  .risk-flags { display: flex; flex-direction: column; gap: 7px; margin-top: 1rem; }
  .risk-flag { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius-md); font-size: 13px; line-height: 1.5; }
  .risk-flag.high { background: var(--red-bg); color: var(--red-text); }
  .risk-flag.medium { background: var(--amber-bg); color: var(--amber-text); }
  .risk-flag.low { background: var(--green-bg); color: var(--green-text); }
  .risk-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .ai-box { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 1.25rem; margin-top: 1rem; }
  .ai-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: #3b6d11; display: inline-block; }
  .ai-narrative { font-size: 13px; color: var(--text); line-height: 1.75; white-space: pre-wrap; }
  .dots { display: inline-flex; gap: 4px; align-items: center; }
  .dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--bg); animation: blink 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.25} 40%{opacity:1} }
  .report-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  @media (max-width: 600px) { .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .form-grid { grid-template-columns: 1fr; } .full { grid-column: 1; } }
</style>
</head>
<body>

<div class="app-shell">
  <div class="topbar">
    <div>
      <h1>Portfolio intelligence</h1>
      <p>Impact-first monitoring &amp; reporting · CapShift</p>
    </div>
    <div class="topbar-right">
      <button onclick="reloadSheet()">Refresh data</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('overview', this)">Portfolio overview</button>
    <button class="tab-btn" onclick="switchTab('monitor', this)">Monitor &amp; analyze</button>
    <button class="tab-btn" onclick="switchTab('report', this)">Quarterly report</button>
  </div>

  <div id="tab-overview" class="section active">
    <div class="last-updated" id="last-updated">Loading portfolio data...</div>
    <div class="metric-grid" id="metric-grid"></div>
    <div class="section-label">Portfolio positions</div>
    <div class="company-list" id="overview-list"></div>
  </div>

  <div id="tab-monitor" class="section">
    <div class="section-label">Select a position to analyze</div>
    <div class="company-list" id="monitor-list"></div>
    <div id="monitor-panel" style="display:none;">
      <div class="panel">
        <h3 id="monitor-panel-title">Update quarterly data</h3>
        <div class="form-grid">
          <div class="form-group"><label>Revenue vs. target (%)</label><input type="number" id="f-revenue" placeholder="e.g. 85" min="0" max="200" /></div>
          <div class="form-group"><label>Cash runway (months)</label><input type="number" id="f-runway" placeholder="e.g. 14" min="0" /></div>
          <div class="form-group"><label>Beneficiaries reached</label><input type="number" id="f-bene" placeholder="e.g. 12400" min="0" /></div>
          <div class="form-group"><label>Impact target achievement (%)</label><input type="number" id="f-impact" placeholder="e.g. 91" min="0" max="200" /></div>
          <div class="form-group"><label>Team headcount trend</label>
            <select id="f-headcount"><option value="">Select...</option><option value="growing">Growing (+10%+)</option><option value="stable">Stable</option><option value="shrinking">Shrinking</option></select>
          </div>
          <div class="form-group"><label>Leadership changes?</label>
            <select id="f-leadership"><option value="none">None</option><option value="minor">Minor (below C-suite)</option><option value="major">Major (CEO / COO / CFO)</option></select>
          </div>
          <div class="form-group full"><label>Notable developments or risks this quarter</label><textarea id="f-notes" placeholder="e.g. Launched new product line in Q1; facing increased competition in core market..."></textarea></div>
        </div>
        <button class="btn-run" id="analyze-btn" onclick="runAnalysis()">Analyze with AI</button>
      </div>
      <div id="analysis-output" style="display:none; margin-top: 1.25rem;">
        <div class="section-label">Risk flags</div>
        <div class="risk-flags" id="risk-flags-list"></div>
        <div class="ai-box" style="margin-top: 1rem;">
          <div class="ai-label"><span class="ai-dot"></span>Monitoring summary</div>
          <div class="ai-narrative" id="monitor-narrative"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-report" class="section">
    <div class="panel">
      <h3>Generate quarterly client report</h3>
      <div class="form-grid">
        <div class="form-group"><label>Quarter</label>
          <select id="r-quarter"><option>Q1 2026</option><option>Q4 2025</option><option>Q3 2025</option></select>
        </div>
        <div class="form-group"><label>Audience</label>
          <select id="r-audience"><option>Donor advised fund</option><option>Family office</option><option>Foundation</option><option>Wealth advisor</option></select>
        </div>
        <div class="form-group full"><label>Specific themes or context to highlight (optional)</label><input type="text" id="r-context" placeholder="e.g. Strong quarter for climate portfolio; flag microfinance repayment risk..." /></div>
      </div>
      <button class="btn-run" id="report-btn" onclick="runReport()">Generate report</button>
    </div>
    <div id="report-output" style="display:none; margin-top: 1.25rem;">
      <div class="report-title" id="report-title"></div>
      <div class="ai-box">
        <div class="ai-label"><span class="ai-dot"></span>Client narrative</div>
        <div class="ai-narrative" id="report-narrative"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config — replace these two values before pushing to GitHub ──
const API_KEY  = "PASTE_YOUR_NEW_KEY_HERE";
const SHEET_ID = "1B4Dc0BO8UEuMw5m5oHmfcXbikxxirZZ_EVRQ-R7XhsQ";
const SHEET_TAB = "portfolio";
// ───────────────────────────────────────────────────────────────

let COMPANIES = [], selectedCompany = null;

async function loadSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;
  let text;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    text = await res.text();
  } catch(e) {
    document.getElementById("last-updated").textContent = "Could not load sheet. Make sure it is published to web (File > Share > Publish to web).";
    return false;
  }
  const rows = parseCSV(text);
  if (rows.length < 2) {
    document.getElementById("last-updated").textContent = "Sheet appears empty. Check the tab name.";
    return false;
  }
  const headers = rows[0].map(h => h.trim().toLowerCase());
  COMPANIES = rows.slice(1).filter(r => r.some(c => c.trim())).map(row => {
    const o = {}; headers.forEach((h,i) => { o[h] = (row[i]||"").trim(); });
    return { name: o.name, type: o.type, capital: o.capital, structure: o.structure, financial: parseInt(o.financial)||0, operational: parseInt(o.operational)||0, impact: parseInt(o.impact)||0, status: o.status||"green", notes: o.notes||"" };
  });
  document.getElementById("last-updated").textContent = "Live data from Google Sheets · Last loaded " + new Date().toLocaleTimeString();
  return true;
}

async function reloadSheet() {
  document.getElementById("last-updated").textContent = "Refreshing...";
  const ok = await loadSheetData();
  if (ok) renderAll();
}

function parseCSV(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch===',' && !inQ) { cols.push(cur); cur=""; }
      else cur+=ch;
    }
    cols.push(cur); rows.push(cols);
  }
  return rows;
}

function pillarColor(s) { return s>=8?"#3b6d11":s>=6?"#854f0b":"#a32d2d"; }
function pillarHTML(label, score) {
  const pct = Math.round((score/10)*100);
  return `<div class="pillar"><div class="p-label">${label}</div><div class="p-score">${score}/10</div><div class="p-bar"><div class="p-fill" style="width:${pct}%;background:${pillarColor(score)};"></div></div></div>`;
}
function badgeHTML(s) {
  if (s==="green") return '<span class="badge badge-green">On track</span>';
  if (s==="amber") return '<span class="badge badge-amber">Monitor</span>';
  return '<span class="badge badge-red">At risk</span>';
}
function companyCardHTML(c, i, listId) {
  return `<div class="company-card" id="${listId}-${i}" onclick="selectCompany(${i},'${listId}')">
    <div class="cc-top"><div><div class="cc-name">${c.name}</div><div class="cc-meta">${c.type} &nbsp;·&nbsp; ${c.structure} &nbsp;·&nbsp; ${c.capital}</div></div>${badgeHTML(c.status)}</div>
    <div class="pillars">${pillarHTML("Financial",c.financial)}${pillarHTML("Operational",c.operational)}${pillarHTML("Impact",c.impact)}</div>
  </div>`;
}
function renderAll() {
  const total = COMPANIES.length;
  const atRisk = COMPANIES.filter(c=>c.status==="red").length;
  const monitor = COMPANIES.filter(c=>c.status==="amber").length;
  const avg = total ? (COMPANIES.reduce((s,c)=>s+(c.financial+c.operational+c.impact)/3,0)/total).toFixed(1) : "—";
  document.getElementById("metric-grid").innerHTML = `
    <div class="metric-card"><div class="m-label">Total portfolio</div><div class="m-value">${total}</div><div class="m-sub">Active positions</div></div>
    <div class="metric-card"><div class="m-label">Avg pillar score</div><div class="m-value">${avg}</div><div class="m-sub">Across all three pillars</div></div>
    <div class="metric-card"><div class="m-label">At risk</div><div class="m-value">${atRisk}</div><div class="m-sub">Red-flagged positions</div></div>
    <div class="metric-card"><div class="m-label">Monitoring</div><div class="m-value">${monitor}</div><div class="m-sub">Amber-flagged positions</div></div>`;
  document.getElementById("overview-list").innerHTML = COMPANIES.map((c,i)=>companyCardHTML(c,i,"ov")).join("");
  document.getElementById("monitor-list").innerHTML = COMPANIES.map((c,i)=>companyCardHTML(c,i,"mo")).join("");
}
function selectCompany(i, listId) {
  if (listId!=="mo") return;
  document.querySelectorAll("#monitor-list .company-card").forEach((el,idx)=>el.classList.toggle("selected",idx===i));
  selectedCompany = COMPANIES[i];
  document.getElementById("monitor-panel").style.display = "block";
  document.getElementById("monitor-panel-title").textContent = `Quarterly data — ${selectedCompany.name}`;
  document.getElementById("analysis-output").style.display = "none";
}
function switchTab(tab, btn) {
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
}
function computeFlags(rv, rw, it, leadership, headcount) {
  const flags = [];
  if (rw!==""&&parseFloat(rw)<9) flags.push({level:"high",icon:"!",text:`Cash runway of ${rw} months is below the 9-month threshold — repayment risk elevated.`});
  if (rv!==""&&parseFloat(rv)<75) flags.push({level:"high",icon:"!",text:`Revenue at ${rv}% of target is significantly below plan — financial pillar at risk.`});
  if (leadership==="major") flags.push({level:"high",icon:"!",text:"Major leadership change detected — monitor for strategy or execution disruption."});
  if (rv!==""&&parseFloat(rv)>=75&&parseFloat(rv)<90) flags.push({level:"medium",icon:"~",text:`Revenue at ${rv}% of target — below plan but manageable. Watch trajectory next quarter.`});
  if (it!==""&&parseFloat(it)<80) flags.push({level:"medium",icon:"~",text:`Impact target at ${it}% — below 80% threshold. Review program delivery.`});
  if (headcount==="shrinking") flags.push({level:"medium",icon:"~",text:"Headcount is shrinking — assess whether this reflects efficiency gains or capacity loss."});
  if (flags.length===0) flags.push({level:"low",icon:"✓",text:"No significant risks flagged this quarter. Performance is on track across all pillars."});
  return flags;
}
async function callClaude(prompt, max_tokens=1000) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens, messages:[{role:"user",content:prompt}] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b=>b.text||"").join("");
}
async function runAnalysis() {
  if (!selectedCompany) return;
  const c = selectedCompany;
  const rv=document.getElementById("f-revenue").value, rw=document.getElementById("f-runway").value;
  const bene=document.getElementById("f-bene").value, it=document.getElementById("f-impact").value;
  const headcount=document.getElementById("f-headcount").value||"stable";
  const leadership=document.getElementById("f-leadership").value||"none";
  const notes=document.getElementById("f-notes").value||"No additional notes.";
  const btn=document.getElementById("analyze-btn");
  btn.disabled=true; btn.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  const flags=computeFlags(rv,rw,it,leadership,headcount);
  document.getElementById("risk-flags-list").innerHTML=flags.map(f=>`<div class="risk-flag ${f.level}"><span class="risk-icon">${f.icon}</span><span>${f.text}</span></div>`).join("");
  const prompt=`You are a portfolio analyst at CapShift, a mission-driven impact investing firm. Write a concise internal quarterly monitoring summary for ${c.name}, a ${c.type} funded via a ${c.structure} of ${c.capital}.

Current pillar scores: Financial ${c.financial}/10, Operational ${c.operational}/10, Impact ${c.impact}/10.
Existing notes: ${c.notes||"none"}

This quarter's data:
- Revenue vs target: ${rv||"not provided"}%
- Cash runway: ${rw||"not provided"} months
- Beneficiaries reached: ${bene?parseInt(bene).toLocaleString():"not provided"}
- Impact target achievement: ${it||"not provided"}%
- Headcount trend: ${headcount}
- Leadership changes: ${leadership}
- Notable developments: ${notes}

Write three paragraphs (4-5 sentences each): (1) financial and operational performance, (2) impact performance and mission alignment, (3) overall assessment and recommended next steps. Be specific, flag concerns directly. Professional but readable tone for an internal research team.`;
  try { document.getElementById("monitor-narrative").textContent = await callClaude(prompt,1000); }
  catch(e) { document.getElementById("monitor-narrative").textContent = "Error: "+e.message; }
  document.getElementById("analysis-output").style.display="block";
  btn.disabled=false; btn.innerHTML="Analyze with AI";
}
async function runReport() {
  const quarter=document.getElementById("r-quarter").value;
  const audience=document.getElementById("r-audience").value;
  const context=document.getElementById("r-context").value||"No specific context provided.";
  const btn=document.getElementById("report-btn");
  btn.disabled=true; btn.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  const summary=COMPANIES.map(c=>`${c.name} (${c.type}, ${c.structure}, ${c.capital}): Financial ${c.financial}/10, Operational ${c.operational}/10, Impact ${c.impact}/10, Status: ${c.status}. Notes: ${c.notes||"none"}`).join("\n");
  const prompt=`You are a senior analyst at CapShift writing a ${quarter} quarterly portfolio report for a ${audience} client.

Portfolio (live from database):
${summary}

Additional context: ${context}

Write a professional quarterly narrative (4-5 paragraphs): (1) executive summary of portfolio performance, (2) standout performers and why they are succeeding, (3) positions requiring attention and the monitoring approach, (4) impact performance themes across the portfolio, (5) outlook and recommended actions. Confident and transparent tone appropriate for a sophisticated philanthropic or family office reader. Reference specific company names and data.`;
  try {
    document.getElementById("report-title").textContent=`${quarter} · ${audience}`;
    document.getElementById("report-narrative").textContent=await callClaude(prompt,1200);
    document.getElementById("report-output").style.display="block";
  } catch(e) {
    document.getElementById("report-narrative").textContent="Error: "+e.message;
    document.getElementById("report-output").style.display="block";
  }
  btn.disabled=false; btn.innerHTML="Generate report";
}

// Auto-load on startup
(async function() {
  const ok = await loadSheetData();
  if (ok) renderAll();
})();
</script>
</body>
</html>
